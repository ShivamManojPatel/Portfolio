<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 5%;
    }

    .error-inner {
      max-width: 500px;
    }

    .error-code {
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 900;
      line-height: 1;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-family: var(--mono);
      margin-bottom: 16px;
      opacity: 0;
    }

    .error-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      opacity: 0;
    }

    .error-desc {
      font-size: 0.95rem;
      color: var(--text2);
      line-height: 1.8;
      margin-bottom: 36px;
      opacity: 0;
    }

    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
    }

    .error-mono {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text3);
      margin-bottom: 24px;
      opacity: 0;
    }

    .error-glitch {
      position: relative;
      display: inline-block;
    }

    .error-glitch::before,
    .error-glitch::after {
      content: '404';
      position: absolute;
      inset: 0;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .error-glitch::before {
      animation: glitch1 3s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
    }

    .error-glitch::after {
      animation: glitch2 3s infinite;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
    }

    @keyframes glitch1 {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-3px, 1px); }
      94% { transform: translate(3px, -1px); }
      96% { transform: translate(-2px, 2px); }
    }

    @keyframes glitch2 {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(3px, -1px); }
      94% { transform: translate(-3px, 1px); }
      96% { transform: translate(2px, -2px); }
    }

    .countdown {
      font-size: 0.78rem;
      color: var(--text3);
      font-family: var(--mono);
      margin-top: 24px;
    }

    .countdown span {
      color: var(--primary);
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div id="noise"></div>

  <!-- NAVBAR -->
  <nav id="navbar" class="scrolled">
    <div class="nav-left">
      <a href="index.html" class="nav-logo">SP</a>
    </div>
    <div class="nav-right">
      <a href="index.html" class="nav-cta">Go Home ↗</a>
    </div>
  </nav>

  <!-- 404 CONTENT -->
  <div class="page-404">
    <div class="error-inner">

      <div class="error-code">
        <span class="error-glitch">404</span>
      </div>

      <p class="error-mono">// page_not_found.error</p>

      <h1 class="error-title">Looks like you got lost.</h1>

      <p class="error-desc">
        The page you are looking for does not exist or has been moved.
        Don't worry — even the best developers hit a 404 sometimes.
      </p>

      <div class="error-actions">
        <a href="index.html" class="btn-primary">Go Home</a>
        <a href="index.html#projects" class="btn-ghost">View Projects ↗</a>
      </div>

      <p class="countdown">
        Redirecting in <span id="countNum">10</span> seconds...
      </p>

    </div>
  </div>

  <script>
    // Entrance animations
    gsap.to(".error-code", {
      opacity: 1, y: 0,
      duration: 0.7,
      ease: "power3.out",
      delay: 0.2
    });

    gsap.to(".error-mono", {
      opacity: 1,
      duration: 0.5,
      delay: 0.5
    });

    gsap.to(".error-title", {
      opacity: 1, y: 0,
      duration: 0.5,
      delay: 0.6,
      ease: "power2.out"
    });

    gsap.to(".error-desc", {
      opacity: 1, y: 0,
      duration: 0.5,
      delay: 0.7,
      ease: "power2.out"
    });

    gsap.to(".error-actions", {
      opacity: 1, y: 0,
      duration: 0.5,
      delay: 0.8,
      ease: "power2.out"
    });

    // Countdown redirect
    let count = 10;
    const countEl = document.getElementById("countNum");
    const timer = setInterval(() => {
      count--;
      countEl.textContent = count;
      if (count <= 0) {
        clearInterval(timer);
        window.location.href = "index.html";
      }
    }, 1000);
  </script>
</body>
</html>
